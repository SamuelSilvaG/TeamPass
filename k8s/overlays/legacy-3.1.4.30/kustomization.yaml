apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../namespace.yaml
  - ../../secret.yaml
  - ../../pvc.yaml
  - ../../configmap.yaml
  - ../../db.yaml
  - ../../web.yaml
patches:
  - target:
      kind: Deployment
      name: teampass-web
    path: health-patch.yaml
  - target:
      kind: Deployment
      name: teampass-web
    path: install-mode-patch.yaml
images:
  - name: localhost:30500/teampass
    newTag: 3.1.4.30-arm64
